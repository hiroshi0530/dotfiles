# mise global tool versions
# https://mise.jdx.dev/
#
# Run `mise install` after symlinking this file to apply all tools.
# Run `mise use --global <tool>@<version>` to update a version.

[tools]
python = "3.12"
node   = "lts"
go     = "latest"
rust   = "latest"
poetry = "latest"
awscli  = "latest"
hurl    = "latest"
kubectl = "latest"
neovim  = "latest"
tmux    = "latest"
copilot = "latest"
# shell enhancements
sheldon  = "latest"
starship = "latest"
atuin    = "latest"
# modern cli tools
bat      = "latest"
eza      = "latest"
fd       = "latest"
delta    = "latest"
lazygit  = "latest"
zoxide   = "latest"
ripgrep  = "latest"

[env]
# GOPATH: go install したバイナリを ~/go/bin に置く
GOPATH = "{{env.HOME}}/go"

[settings]
# Also read .tool-versions files (asdf compatibility)
legacy_version_file = true
# Auto-install missing tools when entering a directory
auto_install = true

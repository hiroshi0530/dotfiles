name: ci

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          ignore_paths: sshrc msshrc .zshrc.d
          ignore_names: .zshrc .zprofile .zsh_aliases .zsh_functions

  install:
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4
      - name: Run install.sh (dry run)
        run: ./install.sh -n
